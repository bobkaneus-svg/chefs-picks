<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Only The Best — Restaurants & hôtels recommandés</title>

<meta property="og:image" content="https://bobkaneus-svg.github.io/chefs-picks/og-image.png"/>

<meta name="twitter:title" content="Only The Best"/>
<meta name="twitter:description" content="1000+ restos recommandés par des chefs étoilés."/>
<meta name="twitter:image" content="https://bobkaneus-svg.github.io/chefs-picks/og-image.png"/>

<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Only The Best"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
tailwind.config={darkMode:"class",theme:{extend:{
colors:{
"surface-high":"#2a2a2a","surface-highest":"#353534","surface-low":"#1c1b1b",
"surface-container":"#201f1f","surface-lowest":"#0e0e0e",
"outline":"#9d8e7c","outline-var":"#504535",
"on-surface":"#e5e2e1","on-surface-var":"#d5c4af",
"bg":"#131313","gold":"#e8a838","gold-light":"#ffc66b","gold-dark":"#281800",
"badge-purple":"#cec9ff","badge-purple-bg":"rgba(206,201,255,.12)"
},
fontFamily:{headline:["Plus Jakarta Sans"],body:["Manrope"],label:["Manrope"]}
}}}
</script>
<style>
:root{--st:calc(env(safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#131313;color:#e5e2e1;font-family:Manrope,sans-serif;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y}
/* Prevent body scroll/bounce on map */
#map,.leaflet-container{touch-action:none;overscroll-behavior:none}
a{text-decoration:none;color:inherit}
.icon{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 300;font-size:24px}
.icon-fill{font-variation-settings:'FILL' 1,'wght' 300}
.serif{font-family:'Times New Roman',serif;font-style:italic}
.noscroll::-webkit-scrollbar{display:none}.noscroll{-ms-overflow-style:none;scrollbar-width:none}

/* Views */
.view{display:none;position:fixed;inset:0;background:#131313;overflow-y:auto;z-index:10;opacity:0;transition:opacity .3s ease}
.view.on{display:block;opacity:1}
.view-map{overflow:hidden}
.view-slide{animation:.3s slideR}
@keyframes slideR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Fade transition for tab views */
.view-fade-in{animation:.3s fadeIn}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:50;height:calc(56px + var(--st));padding-top:var(--st);
background:rgba(19,19,19,.7);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:20px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;
padding:10px 0 calc(8px + var(--sb));
background:rgba(19,19,19,.92);backdrop-filter:blur(18px);border-top-left-radius:16px;border-top-right-radius:16px;
display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(232,168,56,.06)}
.bnav a{display:flex;flex-direction:column;align-items:center;gap:2px;color:#6d6054;font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-family:Manrope;font-weight:500;cursor:pointer;transition:all .25s ease;padding:4px 8px;border-radius:12px;position:relative}
.bnav a.on{color:#ffc66b;font-weight:700;transform:scale(1.05)}
.bnav a.on::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#e8a838;border-radius:0 0 3px 3px}
.bnav a .icon{font-size:24px}

/* Map */
.leaflet-container{background:#0e0e0e!important}
.leaflet-tile{filter:brightness(.35) saturate(0) contrast(1.4)}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.map-fade{position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle,transparent 0%,rgba(19,19,19,.35) 100%)}

/* Pins */
.pin{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pin:hover .pc{transform:scale(1.15)}
.pc{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-family:Manrope;transition:transform .2s}
.ps{margin-top:-1px}
.pin-h .pc{background:#e8a838;color:#281800;border:4px solid #131313;box-shadow:0 0 20px rgba(232,168,56,.4)}
.pin-h .ps{width:4px;height:12px;background:#e8a838}
.pin-w .pc{background:#353534;color:#ffc66b;border:2px solid rgba(232,168,56,.4);box-shadow:0 4px 15px rgba(0,0,0,.4)}
.pin-w .ps{width:2px;height:8px;background:rgba(232,168,56,.4)}
.pin-c .pc{background:#2a2a2a;color:#9d8e7c;border:2px solid #353534}
.pin-c .ps{width:2px;height:6px;background:#353534}
/* Trending pins - fire red/orange gradient (distinct from gold chef pins) */
.pin-trend .pc{background:linear-gradient(135deg,#ff6b3d,#ffa534);color:#fff;border:3px solid #131313;box-shadow:0 0 20px rgba(255,107,61,.5)}
.pin-trend .ps{width:3px;height:10px;background:#ff6b3d}
.pin-both .pc{background:linear-gradient(135deg,#e8a838,#ff6b3d);color:#fff;border:3px solid #131313;box-shadow:0 0 22px rgba(255,140,50,.6)}
.pin-both .ps{width:3px;height:10px;background:#ff8a3d}
.pin-trend-cluster .pc{background:linear-gradient(135deg,#ff6b3d,#ffa534);color:#fff;border:3px solid #131313;font-weight:800;box-shadow:0 0 22px rgba(255,107,61,.5)}
.pin-trend-cluster .ps{width:3px;height:10px;background:#ff6b3d}
.pin-mix-cluster .pc{background:linear-gradient(135deg,#e8a838,#ff6b3d);color:#fff;border:3px solid #131313;font-weight:800;box-shadow:0 0 22px rgba(255,140,50,.6)}
.pin-mix-cluster .ps{width:3px;height:10px;background:#ff8a3d}
/* Hotel pins — cool purple/blue gradient */
.pin-hotel .pc{background:linear-gradient(135deg,#8a7dff,#b0aaff);color:#fff;border:3px solid #131313;box-shadow:0 0 20px rgba(138,125,255,.45)}
.pin-hotel .ps{width:3px;height:10px;background:#8a7dff}

/* Source filter buttons */
.src-btn{color:#9d8e7c;background:transparent;transition:.2s}
.src-btn.on{background:#e8a838;color:#281800}
.src-btn:hover:not(.on){background:rgba(232,168,56,.15);color:#ffc66b}
.meal-btn{background:rgba(42,42,42,.8);color:#9d8e7c;backdrop-filter:blur(8px);border:1px solid rgba(80,69,53,.2);transition:.2s}
.meal-btn.on{background:#e8a838;color:#281800;border-color:#e8a838}
.meal-btn:hover:not(.on){background:rgba(232,168,56,.15);color:#ffc66b}

/* Entity segmented control (Restos / Hôtels) */
.seg{display:inline-flex;background:rgba(28,27,27,.85);backdrop-filter:blur(14px);border:1px solid rgba(80,69,53,.25);border-radius:999px;padding:3px;gap:2px;box-shadow:0 6px 18px rgba(0,0,0,.35)}
.seg button{padding:6px 14px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9d8e7c;display:inline-flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap}
.seg button .icon{font-size:15px}
.seg button.on{background:#e8a838;color:#281800;box-shadow:0 2px 8px rgba(232,168,56,.35)}
.seg button:not(.on):active{background:rgba(232,168,56,.12);color:#ffc66b}

/* Inline chip row (source / meal) directly in explore */
.chip-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 12px 2px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;background:rgba(28,27,27,.82);backdrop-filter:blur(12px);border:1px solid rgba(80,69,53,.2);color:#9d8e7c;transition:.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.pill.on{background:#e8a838;color:#281800;border-color:#e8a838}
.pill:active{transform:scale(.96)}

/* Filters bottom sheet (Airbnb-style) */
.filters-fab{position:relative;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:12px;background:rgba(232,168,56,.12);border:1px solid rgba(232,168,56,.25);color:#ffc66b;transition:.2s;cursor:pointer;flex-shrink:0}
.filters-fab:active{transform:scale(.92)}
.filters-fab.has-active{background:#e8a838;color:#281800;border-color:#e8a838}
.filters-fab .fab-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#ff6b3d;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #131313;font-family:Manrope}
.filters-fab.has-active .fab-badge{background:#131313;color:#ffc66b;border-color:#e8a838}

.sheet-backdrop{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s ease}
.sheet-backdrop.on{opacity:1;pointer-events:auto}
.filters-sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:rgba(19,19,19,.98);backdrop-filter:blur(22px);border-top-left-radius:24px;border-top-right-radius:24px;border-top:1px solid rgba(232,168,56,.12);box-shadow:0 -20px 50px rgba(0,0,0,.6);transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.25,1);padding:8px 20px calc(24px + var(--sb));max-height:85dvh;overflow-y:auto}
.filters-sheet.on{transform:translateY(0)}
.sheet-grab{width:40px;height:4px;background:rgba(157,142,124,.35);border-radius:2px;margin:8px auto 16px}
.sheet-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sheet-title h3{font-family:'Plus Jakarta Sans';font-weight:700;font-size:18px;color:#e5e2e1}
.sheet-title button{color:#9d8e7c;font-size:12px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;padding:6px 10px;border-radius:8px}
.sheet-title button:active{background:rgba(232,168,56,.1);color:#ffc66b}
.sheet-section{margin-bottom:22px}
.sheet-section h4{font-family:Manrope;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#9d8e7c;font-weight:700;margin-bottom:10px}
.sheet-done{width:100%;padding:14px;background:#e8a838;color:#281800;border-radius:14px;font-weight:800;text-transform:uppercase;letter-spacing:1px;font-size:13px;margin-top:8px}
.sheet-done:active{transform:scale(.98)}

/* Cluster */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(19,19,19,.8)!important;border:2px solid rgba(232,168,56,.4)!important;box-shadow:0 0 20px rgba(232,168,56,.25)}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:#e8a838!important;color:#281800!important;font-family:Manrope!important;font-weight:700!important;font-size:13px!important}
.marker-cluster-large{border-color:#e8a838!important}

/* Carousel */
.cscroll{scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-left:16px;padding-right:16px}
.ccard{scroll-snap-align:center;flex-shrink:0;width:88vw;max-width:400px}
.ccard:first-child{margin-left:4px}
.ccard:last-child{margin-right:4px}

/* Badges */
.bp{background:rgba(206,201,255,.12);color:#cec9ff;border:1px solid rgba(206,201,255,.15)}
.bs{background:rgba(232,168,56,.12);color:#e8a838;border:1px solid rgba(232,168,56,.15)}
.bk{background:rgba(176,170,255,.12);color:#b0aaff;border:1px solid rgba(176,170,255,.15)}

/* Loading skeleton */
.skeleton{position:relative;overflow:hidden;background:#2a2a2a;border-radius:16px}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.8s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.loading-overlay{position:fixed;inset:0;z-index:200;background:#131313;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s ease}
.loading-overlay.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid #2a2a2a;border-top-color:#e8a838;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty states */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center}
.empty-state .icon{font-size:64px;color:rgba(157,142,124,.2);margin-bottom:16px}
.empty-state p{color:#9d8e7c;font-size:14px;line-height:1.6}
.empty-state .sub{color:rgba(157,142,124,.5);font-size:12px;margin-top:6px}

/* Search suggestions improved */
.suggest-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s ease;border-bottom:1px solid rgba(80,69,53,.08)}
.suggest-item:hover,.suggest-item:active{background:rgba(53,53,52,.6)}
.suggest-item:last-child{border-bottom:none}
.suggest-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.suggest-icon-city{background:rgba(232,168,56,.12)}
.suggest-icon-chef{background:rgba(206,201,255,.12)}
.suggest-icon-resto{background:rgba(176,170,255,.12)}

/* About section in detail */
.about-section{background:linear-gradient(135deg,rgba(42,42,42,.5),rgba(28,27,27,.5));border:1px solid rgba(80,69,53,.1);border-radius:16px;padding:20px}

/* Discover cards improved */
.discover-card .city-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(232,168,56,.1);border:1px solid rgba(232,168,56,.12);border-radius:20px;font-size:10px;color:#e8a838;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.discover-card .score-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(19,19,19,.85);backdrop-filter:blur(12px);border-radius:12px;border:1px solid rgba(232,168,56,.15)}
.discover-card .score-pill .score-num{font-size:18px;font-weight:800;color:#e8a838;font-family:'Plus Jakarta Sans',sans-serif;line-height:1}
.discover-card .score-pill .score-label{font-size:8px;color:#9d8e7c;text-transform:uppercase;font-weight:700;letter-spacing:.5px;line-height:1.2}
.discover-card .chefs-count{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(206,201,255,.08);border:1px solid rgba(206,201,255,.1);border-radius:20px;font-size:11px;color:#cec9ff;font-weight:600}

/* Chefs view header */
.chefs-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;border-bottom:1px solid rgba(80,69,53,.1);margin-bottom:20px}
.chefs-header .total-picks{font-size:13px;color:#e8a838;font-weight:700}

/* Utility */
.scroll-y{padding-top:calc(56px + var(--st));padding-bottom:calc(70px + var(--sb))}
.card-img{aspect-ratio:16/10;overflow:hidden;border-radius:16px;background:#2a2a2a}
</style>
</head>

<body>
<!-- ═══════ LOADING STATE ═══════ -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <span class="text-gold font-headline text-sm tracking-[.3em] uppercase">Only The Best</span>
  <span class="text-outline text-xs">Chargement des recommandations...</span>
</div>

<!-- ═══════ VIEW: EXPLORE ═══════ -->
<div class="view view-map on" id="v-explore">
  <div class="w-full h-full relative"><div id="map" class="w-full h-full"></div><div class="map-fade"></div></div>
</div>

<!-- Explore overlays (OUTSIDE view to avoid fixed-in-scrollable bug in mobile WebViews) -->
<div id="exploreUI" class="fixed inset-0 z-30 pointer-events-none" style="display:block">
  <!-- Top stack: entity switch + search bar + chip row -->
  <div class="pointer-events-auto" style="position:fixed;top:calc(10px + var(--st));left:0;right:0;z-index:35">
    <!-- Row 1: Entity segmented control (Restos / Hôtels) -->
    <div class="flex justify-center px-3 mb-2">
      <div class="seg" role="tablist" aria-label="Type d'adresse">
        <button id="segRest" onclick="setEntity('restaurant')" class="on" role="tab"><span class="icon">restaurant</span>Restaurants</button>
        <button id="segHotel" onclick="setEntity('hotel')" role="tab"><span class="icon">hotel</span>Hôtels</button>
      </div>
    </div>
    <!-- Row 2: Search + filter button -->
    <div class="flex items-center gap-2 px-3">
      <div class="flex items-center bg-surface-high/85 backdrop-blur-xl rounded-2xl border border-outline-var/10 shadow-2xl p-1 flex-1 min-w-0">
        <span class="icon text-outline pl-3 pr-2 text-xl">search</span>
        <input id="iMapQ" class="bg-transparent border-none outline-none text-on-surface placeholder:text-outline w-full py-2.5 text-sm font-label min-w-0" placeholder="Ville, chef, restaurant..." autocomplete="off"/>
        <button id="btnSearchGo" onclick="confirmSearch()" class="px-3 py-1.5 bg-gold rounded-xl text-gold-dark text-xs font-bold mr-1 uppercase tracking-wider" style="display:none">Go</button>
        <button id="btnSearchClear" onclick="clearSearch()" class="p-2 text-outline mr-1" style="display:none"><span class="icon text-xl">close</span></button>
      </div>
      <button id="btnFilters" onclick="openFiltersSheet()" class="filters-fab shadow-2xl" aria-label="Filtres">
        <span class="icon text-[20px]">tune</span>
        <span id="filtersBadge" class="fab-badge" style="display:none">0</span>
      </button>
    </div>
    <!-- Row 3: Quick chips (meal type — restos uniquement) — scrolls horizontally -->
    <div id="quickChips" class="chip-row mt-2">
      <button id="mAll" onclick="setMealType('all')" class="pill on" data-rest-only>Tous</button>
      <button id="mQuick" onclick="setMealType('quick')" class="pill" data-rest-only>Sur le pouce</button>
      <button id="mCasual" onclick="setMealType('casual')" class="pill" data-rest-only>Casual</button>
      <button id="mSitdown" onclick="setMealType('sitdown')" class="pill" data-rest-only>À table</button>
      <button id="mGastro" onclick="setMealType('gastro')" class="pill" data-rest-only>Gastro</button>
    </div>
    <!-- Autocomplete suggestions -->
    <div id="iSuggestions" class="mx-3 mt-2 bg-surface-high/95 backdrop-blur-xl rounded-2xl border border-outline-var/10 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,.5)]" style="display:none;max-height:420px;overflow-y:auto"></div>
  </div>

  <!-- Filters bottom sheet (simplified: only cities + sort) -->
  <div id="filtersBackdrop" class="sheet-backdrop" onclick="closeFiltersSheet()"></div>
  <div id="filtersSheet" class="filters-sheet pointer-events-auto">
    <div class="sheet-grab"></div>
    <div class="sheet-title">
      <h3>Filtres</h3>
      <button onclick="resetFilters()">Réinitialiser</button>
    </div>
    <!-- City chips -->
    <div class="sheet-section">
      <h4>Ville</h4>
      <div id="iMapChips" class="flex gap-2 flex-wrap"></div>
    </div>
    <button class="sheet-done" onclick="closeFiltersSheet()">Voir les résultats</button>
  </div>
  <!-- Carousel -->
  <div id="iCarousel" class="pointer-events-auto" style="position:fixed;left:0;right:0;z-index:35;bottom:calc(82px + var(--sb));padding:0 8px;display:none"></div>
  <!-- Toggle Map/List button (Airbnb-style) — above the carousel when visible -->
  <div id="btnViewToggle" class="pointer-events-auto" style="position:fixed;left:50%;transform:translateX(-50%);z-index:40;bottom:calc(240px + var(--sb));display:none;transition:bottom .2s ease">
    <button onclick="toggleMapList()" class="bg-bg/95 backdrop-blur-xl text-on-surface px-4 py-2.5 rounded-full shadow-2xl flex items-center gap-2 border border-outline-var/20 active:scale-95 transition-transform">
      <span class="icon text-gold text-base" id="iViewToggle">list</span>
      <span class="text-xs font-bold uppercase tracking-wider" id="iViewToggleLbl">Liste</span>
    </button>
  </div>
  <!-- Geolocation button -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ══════════════════════════════════
// DATA & STATE
// ══════════════════════════════════
var R=[],map,CG,MK={},curView='explore',sort='score',fCity='',fPrice='',hist=[],favs={},geoMarker=null,geoPulse=null,fSource='both',fMeal='all',fEntity='restaurant';

// Is this record a hotel?
function isHotel(r){return (r.entity_type||'')==='hotel'}
function entityMatch(r){
  if(fEntity==='hotel') return isHotel(r);
  return !isHotel(r); // restaurants = everything that isn't a hotel
}

// Toggle between restaurants and hotels
function setEntity(t){
  fEntity=t;
  var sr=document.getElementById('segRest'),sh=document.getElementById('segHotel');
  if(sr)sr.classList.toggle('on',t==='restaurant');
  if(sh)sh.classList.toggle('on',t==='hotel');
  // Hide meal/source chips when viewing hotels (not relevant yet)
  document.querySelectorAll('[data-rest-only]').forEach(function(el){
    el.style.display=t==='hotel'?'none':'';
  });
  // Update placeholder
  var inp=document.getElementById('iMapQ');
  if(inp) inp.placeholder=t==='hotel'?'Ville, hôtel...':'Ville, chef, restaurant...';
  rebuildCG(function(){return true});
  var cEl=document.getElementById('iCarousel');if(cEl)cEl.style.display='none';
  if(typeof buildChips==='function') buildChips();
  if(typeof updateCarousel==='function') setTimeout(updateCarousel,100);
  if(listViewMode) renderExploreList();
  if(curView==='chefs') renderChefs();
  if(typeof updateFiltersBadge==='function') updateFiltersBadge();
}

// Categorize a restaurant by meal type
function getMealType(r){
  var c = (r.cuisine_type||r.categoryName||'').toLowerCase();
  var p = r.price_range||'€€';
  // Quick: street food, sandwich, snack
  if(/snack|bakery|boulangerie|fast|street|takeaway|food truck|sandwich|burger|crepe|crêpe|kebab|pizza takeout|deli|coffee|café|cafe|patisserie|gelato|ice cream|glace/.test(c) || (c==='restaurant' && p==='€')){
    return 'quick';
  }
  // Gastro: starred, fine dining, very expensive
  if(/gastro|gastronom|fine dining|haute cuisine|étoil|michelin/.test(c) || p==='€€€€'){
    return 'gastro';
  }
  // Sitdown: nice restaurant, sit-down, mid-range to expensive
  if(p==='€€€' || /french restaurant|italian restaurant|seafood|fine|chef/.test(c)){
    return 'sitdown';
  }
  // Casual: bistro, brasserie, trattoria, pizza, casual restaurant
  return 'casual';
}

function setMealType(t){
  fMeal=t;
  ['All','Quick','Casual','Sitdown','Gastro'].forEach(function(n){
    var el=document.getElementById('m'+n);
    if(el){var active=t===n.toLowerCase();el.classList.toggle('on',active)}
  });
  rebuildCG(function(){return true});
  var cEl=document.getElementById('iCarousel');if(cEl)cEl.style.display='none';
  if(typeof updateCarousel==='function')setTimeout(updateCarousel,100);
  if(listViewMode)renderExploreList();
  if(typeof updateFiltersBadge==='function') updateFiltersBadge();
}

function mealMatch(r){
  if(fEntity==='hotel') return true; // meal filter n/a for hotels
  if(fMeal==='all') return true;
  return getMealType(r)===fMeal;
}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function ea(s){return s?s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/`/g,'\\`'):''}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
document.addEventListener('DOMContentLoaded',function(){
  if(window.Telegram&&window.Telegram.WebApp){
    try{
      var tg=Telegram.WebApp;
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#131313');
      tg.setBackgroundColor('#131313');
      // Prevent accidental swipe-down to close (Bot API 7.7+)
      if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      // Request full screen mode (Bot API 8.0+)
      if(tg.requestFullscreen) try{tg.requestFullscreen()}catch(e){}
      // Prevent app close on swipe down
      if(tg.enableClosingConfirmation) tg.enableClosingConfirmation();
    }catch(e){}
  }
  fetch('data.json').then(function(r){return r.json()}).then(function(d){
    // Filter: only trending restaurants + hotels (chef-only recommendations hidden for now)
    R = d.filter(function(r){
      if(r.entity_type==='hotel') return true;
      return r.source_type==='trending' || r.source_type==='both';
    });
    boot();
  }).catch(function(){R=[];boot()});
});

function boot(){
  // Load favorites from localStorage
  try{var f=localStorage.getItem('chefspicks_favs');if(f)favs=JSON.parse(f)}catch(e){}

  initMap();
  setEntity('restaurant'); // default entity
  // Source filter no longer in UI — always show trending + both (filtered at load)
  setMealType('all'); // Initialize meal type filter
  go('explore');
  var el;
  el=document.getElementById('iMapQ');if(el){
    el.addEventListener('input',onSearchInput);
    el.addEventListener('focus',function(){if(el.value.length>0)showSuggestions(el.value)});
    el.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();confirmSearch()}});
  }
  var listTimer=null;
  el=document.getElementById('iListQ');if(el)el.addEventListener('input',function(){clearTimeout(listTimer);listTimer=setTimeout(renderList,200)});
  var chefTimer=null;
  el=document.getElementById('iChefQ');if(el)el.addEventListener('input',function(){clearTimeout(chefTimer);chefTimer=setTimeout(renderChefs,200)});
  // Close suggestions on outside click
  document.addEventListener('click',function(e){
    var sg=document.getElementById('iSuggestions');
    if(sg&&!sg.contains(e.target)&&e.target.id!=='iMapQ')sg.style.display='none';
  });
  // Stats
  var ch={};R.forEach(function(r){r.recommendations.forEach(function(c){ch[c.chef_name]=1})});
  var se=document.getElementById('oDrawerStats');
  if(se)se.textContent=R.length+' adresses \u00b7 '+Object.keys(ch).length+' chefs';
  // Hide loading overlay
  var lo=document.getElementById('loadingOverlay');
  if(lo){lo.classList.add('hide');setTimeout(function(){lo.style.display='none'},500)}
  // Deep link: open specific restaurant if hash matches
  handleHash();
  window.addEventListener('hashchange', handleHash);
  // Show install banner for non-Telegram mobile users (après boot)
  setTimeout(maybeShowInstallBanner, 2000);
}

// Deep linking: #r=resto-id ou #chef=nom
function handleHash(){
  var h = location.hash.replace(/^#/, '');
  if(!h) return;
  var m = h.match(/^r=(.+)$/);
  if(m){
    var id = decodeURIComponent(m[1]);
    if(R.find(function(x){return x.id===id})) setTimeout(function(){openResto(id)}, 100);
    return;
  }
  m = h.match(/^chef=(.+)$/);
  if(m){
    var name = decodeURIComponent(m[1]);
    setTimeout(function(){openChef(name)}, 100);
  }
}

// Install banner pour les users non-Telegram sur mobile
function maybeShowInstallBanner(){
  if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) return; // dans Telegram
  if(window.matchMedia('(display-mode: standalone)').matches) return; // déjà installée
  if(localStorage.getItem('chefspicks_hideInstall')==='1') return;
  var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if(!isMobile) return;
  var isIOS = /iPhone|iPad/i.test(navigator.userAgent);
  var html = '<div style="position:fixed;bottom:calc(80px + var(--sb));left:12px;right:12px;background:linear-gradient(135deg,#e8a838 0%,#ffc66b 100%);color:#131313;padding:12px 14px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;gap:10px;font-family:Manrope">'+
    '<div style="flex:1"><div style="font-weight:800;font-size:13px">Installer Only The Best</div>'+
    '<div style="font-size:11px;opacity:.8;margin-top:2px">'+(isIOS?'Appuie sur Partager puis \u201cSur l\'\u00e9cran d\'accueil\u201d':'Appuie sur \u201cInstaller l\'app\u201d dans ton navigateur')+'</div></div>'+
    '<button id="dismissInstall" style="background:rgba(19,19,19,.15);border:0;padding:6px 10px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">OK</button></div>';
  var div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstChild);
  document.getElementById('dismissInstall').onclick = function(){
    localStorage.setItem('chefspicks_hideInstall','1');
    this.parentNode.remove();
  };
}

// ══════════════════════════════════
// FAVORITES
// ══════════════════════════════════
function isFav(id){return !!favs[id]}
function toggleFav(id,e){
  if(e)e.stopPropagation();
  if(favs[id])delete favs[id];else favs[id]=Date.now();
  try{localStorage.setItem('chefspicks_favs',JSON.stringify(favs))}catch(ex){}
  // Update heart icon
  var safeId=id.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  var icons=document.querySelectorAll('.fav-btn[data-id="'+safeId+'"]');
  for(var i=0;i<icons.length;i++){
    icons[i].querySelector('.icon').textContent=favs[id]?'favorite':'favorite_border';
    icons[i].querySelector('.icon').classList.toggle('icon-fill',!!favs[id]);
  }
}

// ══════════════════════════════════
// GEOLOCATION
// ══════════════════════════════════
function geolocate(){
  // Try Telegram LocationManager first (works in Mini Apps)
  if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.LocationManager){
    var lm=Telegram.WebApp.LocationManager;
    if(!lm.isInited){
      lm.init(function(){
        if(lm.isLocationAvailable){requestTgLocation()}
        else{fallbackGeo()}
      });
    }else if(lm.isLocationAvailable){requestTgLocation()}
    else{fallbackGeo()}
    return;
  }
  fallbackGeo();
}

function requestTgLocation(){
  Telegram.WebApp.LocationManager.getLocation(function(loc){
    if(loc&&loc.latitude){showGeoPosition(loc.latitude,loc.longitude)}
    else{fallbackGeo()}
  });
}

function fallbackGeo(){
  if(!navigator.geolocation){
    alert('Active la géolocalisation dans les réglages de ton téléphone');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){showGeoPosition(pos.coords.latitude,pos.coords.longitude)},
    function(err){
      if(err.code===1)alert('Autorise la géolocalisation pour cette app');
      else alert('Impossible de te géolocaliser. Vérifie tes réglages.');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:60000}
  );
}

function showGeoPosition(lat,lng){
  if(geoMarker)map.removeLayer(geoMarker);
  if(geoPulse)map.removeLayer(geoPulse);
  // Blue dot with pulse
  geoMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#4285f4',fillOpacity:1,color:'#fff',weight:3,opacity:1}).addTo(map);
  // Pulse ring
  geoPulse=L.circleMarker([lat,lng],{radius:20,fillColor:'#4285f4',fillOpacity:0.15,color:'#4285f4',weight:1,opacity:0.3}).addTo(map);
  map.setView([lat,lng],14,{animate:true});
}

// ══════════════════════════════════
// SEARCH WITH AUTOCOMPLETE
// ══════════════════════════════════
function onSearchInput(e){
  var q=e.target.value.trim();
  // Show/hide Go and Clear buttons
  document.getElementById('btnSearchGo').style.display=q.length>0?'block':'none';
  document.getElementById('btnSearchClear').style.display=q.length>0?'block':'none';
  if(q.length>=2){showSuggestions(q)}
  else{document.getElementById('iSuggestions').style.display='none';onMapQ(e)}
}

function showSuggestions(q){
  var ql=q.toLowerCase();
  var sg=document.getElementById('iSuggestions');
  // Collect matching cities, chefs, restaurants
  var cityMatch={},chefMatch={},restoMatch=[];
  R.forEach(function(r){
    if(r.city.toLowerCase().indexOf(ql)!==-1)cityMatch[r.city]=(cityMatch[r.city]||0)+1;
    r.recommendations.forEach(function(c){if(c.chef_name.toLowerCase().indexOf(ql)!==-1)chefMatch[c.chef_name]=c.chef_restaurant||''});
    if(r.name.toLowerCase().indexOf(ql)!==-1)restoMatch.push(r);
  });
  var html='',totalCount=0,maxResults=8;
  // Cities
  var cityArr=[];for(var c in cityMatch)cityArr.push([c,cityMatch[c]]);
  cityArr.sort(function(a,b){return b[1]-a[1]});
  if(cityArr.length>0)html+='<div class="px-4 pt-3 pb-1"><span class="text-[9px] text-outline uppercase tracking-widest font-bold">Villes</span></div>';
  cityArr.slice(0,3).forEach(function(c){
    if(totalCount>=maxResults)return;totalCount++;
    html+='<div onclick="selectSuggestion(\'city\',\''+ea(c[0])+'\')" class="suggest-item">'+
      '<div class="suggest-icon suggest-icon-city"><span class="icon text-gold text-lg">location_city</span></div>'+
      '<div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">'+esc(c[0])+'</p></div>'+
      '<span class="text-[11px] text-outline bg-surface-highest px-2 py-0.5 rounded-full">'+c[1]+' restos</span>'+
    '</div>';
  });
  // Chefs
  var chefArr=[];for(var c in chefMatch)chefArr.push([c,chefMatch[c]]);
  if(chefArr.length>0&&totalCount<maxResults)html+='<div class="px-4 pt-3 pb-1"><span class="text-[9px] text-outline uppercase tracking-widest font-bold">Chefs</span></div>';
  chefArr.slice(0,3).forEach(function(c){
    if(totalCount>=maxResults)return;totalCount++;
    html+='<div onclick="selectSuggestion(\'chef\',\''+ea(c[0])+'\')" class="suggest-item">'+
      '<div class="suggest-icon suggest-icon-chef"><span class="icon text-badge-purple text-lg">person</span></div>'+
      '<div class="min-w-0"><p class="text-sm font-semibold truncate">'+esc(c[0])+'</p>'+(c[1]?'<p class="text-[10px] text-outline truncate">'+esc(c[1])+'</p>':'')+'</div>'+
    '</div>';
  });
  // Restaurants
  if(restoMatch.length>0&&totalCount<maxResults)html+='<div class="px-4 pt-3 pb-1"><span class="text-[9px] text-outline uppercase tracking-widest font-bold">Restaurants</span></div>';
  restoMatch.slice(0,4).forEach(function(r){
    if(totalCount>=maxResults)return;totalCount++;
    html+='<div onclick="selectSuggestion(\'resto\',\''+ea(r.id)+'\')" class="suggest-item">'+
      '<div class="suggest-icon suggest-icon-resto"><span class="icon text-[#b0aaff] text-lg">restaurant</span></div>'+
      '<div class="min-w-0"><p class="text-sm font-semibold truncate">'+esc(r.name)+'</p><p class="text-[10px] text-outline truncate">'+esc(r.city)+' · '+esc(r.cuisine_type)+'</p></div>'+
      '<span class="text-gold font-bold text-xs flex-shrink-0">'+r.confidence_score+'</span>'+
    '</div>';
  });
  if(!html){sg.style.display='none';return}
  sg.innerHTML=html;
  sg.style.display='block';
}

function selectSuggestion(type,val){
  document.getElementById('iSuggestions').style.display='none';
  var input=document.getElementById('iMapQ');
  if(type==='city'){
    input.value=val;
    // Filter to this city
    rebuildCG(function(r){return r.city===val});
    var pts=[];R.forEach(function(r){if(r.city===val&&r.coordinates)pts.push([r.coordinates.lat,r.coordinates.lng])});
    if(pts.length)map.fitBounds(L.latLngBounds(pts),{padding:[80,80],maxZoom:15});
  }else if(type==='chef'){
    input.value=val;
    openChef(val);
  }else if(type==='resto'){
    input.value='';
    openResto(val);
  }
  document.getElementById('btnSearchGo').style.display='none';
  document.getElementById('btnSearchClear').style.display=input.value.length>0?'block':'none';
  input.blur();
}

function confirmSearch(){
  document.getElementById('iSuggestions').style.display='none';
  var input=document.getElementById('iMapQ');
  var q=input.value.trim().toLowerCase();
  if(!q)return;
  input.blur();
  // Apply filter
  var pts=[];
  rebuildCG(function(r){
    var h=[r.name,r.city,r.country||'',r.cuisine_type].concat(r.tags||[]);
    r.recommendations.forEach(function(c){h.push(c.chef_name)});
    var ok=h.join(' ').toLowerCase().indexOf(q)!==-1;
    if(ok&&r.coordinates)pts.push([r.coordinates.lat,r.coordinates.lng]);
    return ok;
  });
  if(pts.length)map.fitBounds(L.latLngBounds(pts),{padding:[80,80],maxZoom:14});
  document.getElementById('btnSearchGo').style.display='none';
}

function clearSearch(){
  var input=document.getElementById('iMapQ');
  input.value='';
  document.getElementById('iSuggestions').style.display='none';
  document.getElementById('btnSearchGo').style.display='none';
  document.getElementById('btnSearchClear').style.display='none';
  rebuildCG(function(){return true});
  map.setView([46.5,2.5],6);
}

// ══════════════════════════════════
// NAV
// ══════════════════════════════════
function go(v){
  // Legacy: 'discover' now collapses to 'explore' (its list mode covers the same need).
  if(v==='discover') v='explore';
  if(v!=='detail')document.getElementById('v-detail').classList.remove('on','view-slide');
  ['explore','chefs','saved'].forEach(function(n){var e=document.getElementById('v-'+n);if(e){e.classList.remove('view-fade-in');e.classList.toggle('on',n===v);if(n===v&&n!=='explore'){e.classList.add('view-fade-in')}}});
  // Show/hide explore overlays
  var eui=document.getElementById('exploreUI');
  if(eui)eui.style.display=(v==='explore')?'block':'none';
  curView=v;
  document.querySelectorAll('.bnav a[data-t]').forEach(function(a){
    var act=a.getAttribute('data-t')===v;
    a.classList.toggle('on',act);
    var ic=a.querySelector('.icon');
    if(ic){ic.classList.toggle('icon-fill',act)}
  });
  if(v==='explore')setTimeout(function(){if(map)map.invalidateSize()},150);
  if(v==='chefs')renderChefs();
  if(v==='saved')renderSaved();
  hist=[];
}

// Drawer removed — keep stub so any lingering call is a no-op
function toggleDrawer(){/* drawer deprecated */}

// ══════════════════════════════════
// DETAIL
// ══════════════════════════════════
function openResto(id){
  var r=R.find(function(x){return x.id===id});if(!r)return;
  hist.push('resto:'+id);
  var isH=isHotel(r);
  // Entity-aware labels
  var L={

function initMap(){
  if(typeof L==='undefined')return;
  map=L.map('map',{zoomControl:false,attributionControl:false,tap:true}).setView([46.5,2.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

  CG=L.markerClusterGroup({maxClusterRadius:40,showCoverageOnHover:false,zoomToBoundsOnClick:true,disableClusteringAtZoom:15,
    iconCreateFunction:function(cl){
      var n=cl.getChildCount(),sz=n>20?52:n>5?44:36;
      // Compte les trending dans le cluster pour choisir le style
      var kids=cl.getAllChildMarkers(),nTrend=0,nBoth=0;
      for(var i=0;i<kids.length;i++){
        var s=kids[i].options.srcType;
        if(s==='trending')nTrend++;
        else if(s==='both')nBoth++;
      }
      var c;
      if(nTrend+nBoth===kids.length && nTrend>0){c='pin-trend-cluster'} // 100% trending
      else if(nTrend+nBoth>kids.length*0.5){c='pin-mix-cluster'} // majorité trending
      else c=n>20?'pin-h':n>5?'pin-w':'pin-c';
      return L.divIcon({className:'',html:'<div class="pin '+c+'"><div class="pc" style="width:'+sz+'px;height:'+sz+'px"><span>'+n+'</span></div><div class="ps"></div></div>',iconSize:[sz,sz+12],iconAnchor:[sz/2,sz+12]})
    }
  });

  R.forEach(function(r){
    if(!r.coordinates||!r.coordinates.lat||!r.coordinates.lng)return;
    var src=r.source_type||'chef';
    var n=r.recommendation_count||1;
    var content, cls, sz;
    if(isHotel(r)){
      cls='pin-hotel'; sz=36;
      content='<span style="font-size:14px">🏨</span>';
    }else if(src==='trending'){
      cls='pin-trend'; sz=36;
      content='<span style="font-size:14px">🔥</span>';
    }else if(src==='both'){
      cls='pin-both'; sz=42;
      content=String(n);
    }else{
      cls=n>=3?'pin-h':n>=2?'pin-w':'pin-c';
      sz=n>=3?48:n>=2?40:32;
      content=String(n);
    }
    var ic=L.divIcon({className:'',html:'<div class="pin '+cls+'"><div class="pc" style="width:'+sz+'px;height:'+sz+'px">'+content+'</div><div class="ps"></div></div>',iconSize:[sz,sz+12],iconAnchor:[sz/2,sz+12]});
    var m=L.marker([r.coordinates.lat,r.coordinates.lng],{icon:ic,srcType:src,entityType:r.entity_type||''});
    m.on('click',function(e){L.DomEvent.stopPropagation(e);showPreview(r)});
    MK[r.id]=m;CG.addLayer(m);
  });
  map.addLayer(CG);

  var cto=null;
  map.on('moveend zoomend',function(){
    clearTimeout(cto);
    cto=setTimeout(function(){
      updateCarousel();
      updateToggleVisibility();
      if(listViewMode) renderExploreList();
    },300);
  });
  map.on('zoomend', updateToggleVisibility);
  map.on('click',function(){document.getElementById('iCarousel').style.display='none'});
  // Initial carousel after map is ready
  setTimeout(updateCarousel,500);

  buildChips();
}

function buildChips(){
  var ct={};R.forEach(function(r){
    if(!entityMatch(r)) return;
    ct[r.city]=(ct[r.city]||0)+1
  });
  var arr=[];for(var c in ct)arr.push([c,ct[c]]);
  arr.sort(function(a,b){return b[1]-a[1]});
  var h='';arr.slice(0,12).forEach(function(e){
    h+='<button data-city="'+esc(e[0])+'" onclick="chipCity(this)" class="chip px-4 py-1.5 rounded-full bg-surface-highest text-on-surface-var text-xs uppercase tracking-wider whitespace-nowrap border border-outline-var/10 flex-shrink-0">'+esc(e[0])+' <span class="text-outline text-[10px]">'+e[1]+'</span></button>'
  });
  document.getElementById('iMapChips').innerHTML=h;
}

function chipCity(btn){
  var city=btn.getAttribute('data-city'),active=btn.classList.contains('bg-gold');
  document.querySelectorAll('.chip').forEach(function(b){
    b.classList.remove('bg-gold','text-gold-dark','font-bold','shadow-lg');
    b.classList.add('bg-surface-highest','text-on-surface-var');
    var cn=b.getAttribute('data-city'),n=0;R.forEach(function(r){if(r.city===cn)n++});
    b.innerHTML=esc(cn)+' <span class="text-outline text-[10px]">'+n+'</span>';
  });
  if(active){rebuildCG(function(){return true});map.setView([46.5,2.5],6)}
  else{
    btn.classList.remove('bg-surface-highest','text-on-surface-var');
    btn.classList.add('bg-gold','text-gold-dark','font-bold','shadow-lg');
    btn.innerHTML=esc(city)+' <span class="icon text-[14px] align-middle">close</span>';
    rebuildCG(function(r){return r.city===city});
    var pts=[];R.forEach(function(r){if(r.city===city&&r.coordinates)pts.push([r.coordinates.lat,r.coordinates.lng])});
    if(pts.length)map.fitBounds(L.latLngBounds(pts),{padding:[80,80],maxZoom:15});
  }
  document.getElementById('iCarousel').style.display='none';
  if(typeof updateFiltersBadge==='function') updateFiltersBadge();
}

var RMap={};// id->restaurant lookup, built once
function ensureRMap(){if(Object.keys(RMap).length!==R.length){RMap={};R.forEach(function(r){RMap[r.id]=r})}}
function rebuildCG(fn){ensureRMap();CG.clearLayers();for(var id in MK){var r=RMap[id];if(r&&fn(r)&&entityMatch(r)&&sourceMatch(r)&&mealMatch(r))CG.addLayer(MK[id])}}

// Source filter (chefs/trending/both)
function sourceMatch(r){
  if(fEntity==='hotel') return true; // all hotels are 'trending' source, skip filter
  var src=r.source_type||'chef';
  if(fSource==='both') return true;
  if(fSource==='chef') return src==='chef'||src==='both';
  if(fSource==='trending') return src==='trending'||src==='both';
  return true;
}

var _lbState = null;
function openPhoto(restoId, startIndex){
  // Compat: ancien appel openPhoto(url)
  var photos, idx;
  if(typeof restoId === 'string' && restoId.indexOf('http') === 0){
    photos = [restoId]; idx = 0;
  } else {
    var r = R.find(function(x){return x.id===restoId});
    if(!r || !r.review_photos || !r.review_photos.length) return;
    photos = r.review_photos; idx = startIndex || 0;
  }
  var existing = document.getElementById('photoLightbox');
  if(existing) existing.remove();
  var lb = document.createElement('div');
  lb.id = 'photoLightbox';
  lb.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;touch-action:pan-y;user-select:none';
  lb.innerHTML =
    '<img id="lbImg" src="'+photos[idx]+'" style="max-width:95vw;max-height:95vh;object-fit:contain;transition:transform .15s ease-out"/>'+
    '<div id="lbCount" style="position:absolute;bottom:calc(30px + var(--sb));left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:Manrope">'+(idx+1)+' / '+photos.length+'</div>'+
    (photos.length > 1 ?
      '<button id="lbPrev" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:0;width:44px;height:44px;border-radius:50%;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center">‹</button>'+
      '<button id="lbNext" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:0;width:44px;height:44px;border-radius:50%;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center">›</button>'
      : '')+
    '<button id="lbClose" style="position:absolute;top:calc(20px + var(--st));right:20px;background:rgba(255,255,255,.2);border:0;border-radius:50%;width:40px;height:40px;color:#fff;font-size:24px;cursor:pointer">×</button>';
  document.body.appendChild(lb);
  _lbState = {photos: photos, idx: idx};

  function updateImg(){
    document.getElementById('lbImg').src = photos[_lbState.idx];
    document.getElementById('lbCount').textContent = (_lbState.idx+1)+' / '+photos.length;
  }
  function prev(){ _lbState.idx = (_lbState.idx - 1 + photos.length) % photos.length; updateImg() }
  function next(){ _lbState.idx = (_lbState.idx + 1) % photos.length; updateImg() }
  function close(){ lb.remove(); _lbState = null; document.removeEventListener('keydown', keyHandler) }

  var prevBtn = document.getElementById('lbPrev');
  var nextBtn = document.getElementById('lbNext');
  if(prevBtn) prevBtn.onclick = function(e){ e.stopPropagation(); prev() };
  if(nextBtn) nextBtn.onclick = function(e){ e.stopPropagation(); next() };
  document.getElementById('lbClose').onclick = function(e){ e.stopPropagation(); close() };

  // Tap on empty area closes
  lb.addEventListener('click', function(e){
    if(e.target === lb) close();
  });

  // Swipe navigation
  var sx = 0, sy = 0, dx = 0, dy = 0, tracking = false;
  lb.addEventListener('touchstart', function(e){
    if(e.touches.length !== 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; dx = 0; dy = 0; tracking = true;
  }, {passive: true});
  lb.addEventListener('touchmove', function(e){
    if(!tracking) return;
    dx = e.touches[0].clientX - sx;
    dy = e.touches[0].clientY - sy;
    if(Math.abs(dx) > Math.abs(dy)){
      var img = document.getElementById('lbImg');
      if(img) img.style.transform = 'translateX('+(dx*0.3)+'px)';
    }
  }, {passive: true});
  lb.addEventListener('touchend', function(){
    if(!tracking) return;
    tracking = false;
    var img = document.getElementById('lbImg');
    if(img) img.style.transform = '';
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
      if(dx < 0) next(); else prev();
    } else if(Math.abs(dy) > 120 && Math.abs(dy) > Math.abs(dx)){
      close();
    }
  });

  // Keyboard nav
  function keyHandler(e){
    if(e.key === 'ArrowLeft') prev();
    else if(e.key === 'ArrowRight') next();
    else if(e.key === 'Escape') close();
  }
  document.addEventListener('keydown', keyHandler);
}

function renderExploreList(){
  var listEl = document.getElementById('exploreListCards');
  if(!listEl||!map) return;
  var b = map.getBounds();
  var visible = R.filter(function(r){
    if(!r.coordinates||!r.coordinates.lat) return false;
    if(!sourceMatch(r)) return false;
    if(!MK[r.id]||!CG.hasLayer(MK[r.id])) return false;
    return b.contains([r.coordinates.lat, r.coordinates.lng]);
  });
  visible.sort(function(a,b){
    // Sort: chef recos first, then by score
    var aBoth = a.source_type==='both' ? 2 : (a.source_type==='chef' ? 1 : 0);
    var bBoth = b.source_type==='both' ? 2 : (b.source_type==='chef' ? 1 : 0);
    if(bBoth !== aBoth) return bBoth - aBoth;
    return (b.confidence_score||0) - (a.confidence_score||0);
  });
  var label = fEntity==='hotel' ? 'hôtel' : 'restaurant';
  if(!visible.length){
    listEl.innerHTML = '<div class="text-center pt-12"><span class="icon text-outline/40 text-[48px]">map</span><p class="text-outline text-sm mt-2">Aucun '+label+' dans cette zone</p><p class="text-outline/60 text-xs mt-1">Dézoome ou bouge la carte</p></div>';
    return;
  }
  var html = '<p class="text-xs text-outline mb-3">'+visible.length+' '+label+(visible.length>1?'s':'')+' dans cette zone</p>';
  visible.forEach(function(r){
    var src = r.source_type||'chef';
    var isH = isHotel(r);
    var fallbackIcon = isH?'hotel':'restaurant';
    var img = r.photo_url ? '<img src="'+esc(r.photo_url)+'" class="w-full h-full object-cover"/>' : '<div class="w-full h-full bg-surface-high flex items-center justify-center"><span class="icon text-[28px] text-outline/30">'+fallbackIcon+'</span></div>';
    var srcBadge = '';
    if(isH) srcBadge = '<span class="text-[9px] font-bold text-[#ff8a3d] uppercase">🏨 '+(r.google_rating||'')+'★ · '+(r.reviews_count_google||0)+' avis</span>';
    else if(src==='trending') srcBadge = '<span class="text-[9px] font-bold text-[#ff8a3d] uppercase">🔥 '+(r.google_rating||'')+'★</span>';
    else if(src==='both') srcBadge = '<span class="text-[9px] font-bold text-gold uppercase">👨‍🍳🔥 '+r.recommendation_count+' chef'+(r.recommendation_count>1?'s':'')+'</span>';
    else srcBadge = '<span class="text-[9px] font-bold text-gold uppercase">👨‍🍳 '+r.recommendation_count+' chef'+(r.recommendation_count>1?'s':'')+'</span>';
    var vibeTeaser = (r.vibes&&r.vibes.length>0) ? '<p class="serif text-[11px] text-on-surface-var/90 truncate mt-1 italic">'+esc(r.vibes[0])+'</p>' : '';
    html += '<div onclick="openResto(\''+ea(r.id)+'\')" class="bg-surface-low rounded-2xl overflow-hidden flex cursor-pointer active:scale-[.98] transition-transform border border-outline-var/5">'+
      '<div class="w-24 h-24 flex-shrink-0">'+img+'</div>'+
      '<div class="flex-1 p-3 min-w-0">'+
        '<h3 class="font-headline font-bold text-sm truncate">'+esc(r.name)+'</h3>'+
        '<p class="text-[10px] text-outline uppercase tracking-wider truncate mt-0.5">'+esc(r.cuisine_type||'Restaurant')+' · '+esc(r.price_range||'€€')+'</p>'+
        vibeTeaser+
        '<div class="mt-2 flex items-center gap-2">'+srcBadge+'</div>'+
      '</div>'+
    '</div>';
  });
  listEl.innerHTML = html;
}

    try{
      var prev=MK[activeHighlight].getElement();
      if(prev){var pw=prev.querySelector('.pin');if(pw){pw.style.transform='';pw.style.zIndex='';pw.style.filter=''}}
    }catch(e){}
  }
  activeHighlight=id;
  if(!id||!MK[id])return;

  // Try to highlight — marker may not be rendered yet if in cluster
  try{
    var el=MK[id].getElement();
    if(el){
      var wrap=el.querySelector('.pin');
      if(wrap){
        wrap.style.transform='scale(1.4)';
        wrap.style.zIndex='9999';
        wrap.style.filter='drop-shadow(0 0 14px rgba(232,168,56,0.8))';
      }
    }
  }catch(e){}
}

// Track last carousel content to avoid unnecessary rebuilds
var cLastIds='';

function updateCarousel(){
  var el=document.getElementById('iCarousel');
  if(!map||cScrollLock)return;
  // Ne pas afficher le carousel en mode liste
  if(listViewMode){ if(el)el.style.display='none'; repositionFabs(); return; }
  var b=map.getBounds(),vis=[],seen={};
  R.forEach(function(r){
    if(!r.coordinates||!MK[r.id]||!CG.hasLayer(MK[r.id]))return;
    if(!b.contains([r.coordinates.lat,r.coordinates.lng]))return;
    if(seen[r.id])return; // strict dedup
    seen[r.id]=true;
    vis.push(r);
  });
  vis.sort(function(a,b){return(b.confidence_score||0)-(a.confidence_score||0)});
  vis=vis.slice(0,30);

  // Remember currently focused restaurant ID before potential rebuild
  var currentFocusId = (cVis && cVis[cIdx]) ? cVis[cIdx].id : null;

  // Check if content actually changed
  var newIds=vis.map(function(r){return r.id}).join(',');
  if(newIds===cLastIds){return} // same cards, don't rebuild
  cLastIds=newIds;
  cVis=vis;

  if(!vis.length){el.style.display='none';highlightPin(null);repositionFabs();return}
  el.style.display='block';
  repositionFabs();
  var cards='';vis.forEach(function(r){cards+=buildCard(r)});
  el.innerHTML='<div id="cscrollEl" class="flex gap-2 overflow-x-auto cscroll noscroll py-1" style="scroll-padding:0 40vw">'+cards+'</div>';

  // Attach scroll listener
  var sc=document.getElementById('cscrollEl');
  if(sc){
    var scrollTimer=null;
    var isUserScrolling=false;
    sc.addEventListener('touchstart',function(){isUserScrolling=true},{passive:true});
    sc.addEventListener('touchend',function(){
      // Debounce snap detection after touch ends
      setTimeout(function(){isUserScrolling=false},100);
    },{passive:true});
    // Also support desktop mouse/trackpad scrolling
    sc.addEventListener('mousedown',function(){isUserScrolling=true});
    sc.addEventListener('mouseup',function(){setTimeout(function(){isUserScrolling=false},100)});
    sc.addEventListener('wheel',function(){
      isUserScrolling=true;
      clearTimeout(scrollTimer);
      scrollTimer=setTimeout(function(){onCarouselSnap(sc);isUserScrolling=false},200);
    },{passive:true});
    sc.addEventListener('scroll',function(){
      if(!isUserScrolling)return; // only react to user swipes, not programmatic scrolls
      clearTimeout(scrollTimer);
      scrollTimer=setTimeout(function(){
        onCarouselSnap(sc);
      },150);
    },{passive:true});
  }
  // Restore scroll position to the previously focused restaurant
  if(currentFocusId && sc){
    var newIdx = -1;
    for(var i=0;i<vis.length;i++){if(vis[i].id===currentFocusId){newIdx=i;break}}
    if(newIdx>=0){
      cIdx = newIdx;
      // Scroll to that card without triggering snap
      cScrollLock = true;
      var card = sc.children[newIdx];
      if(card){
        var cardLeft = card.offsetLeft - sc.offsetLeft - (sc.offsetWidth - card.offsetWidth) / 2;
        sc.scrollLeft = Math.max(0, cardLeft); // instant, no animation
      }
      setTimeout(function(){cScrollLock=false}, 100);
      highlightPin(currentFocusId);
      return;
    }
  }
  // Default: highlight first
  if(vis.length>0){cIdx=0;highlightPin(vis[0].id)}
}

function onCarouselSnap(sc){
  var cards=sc.querySelectorAll('.ccard');
  if(!cards.length)return;
  var center=sc.scrollLeft+sc.offsetWidth/2;
  var bestIdx=0,bestDist=Infinity;
  for(var i=0;i<cards.length;i++){
    var cardCenter=cards[i].offsetLeft+cards[i].offsetWidth/2;
    var dist=Math.abs(center-cardCenter);
    if(dist<bestDist){bestDist=dist;bestIdx=i}
  }
  if(bestIdx===cIdx)return;
  cIdx=bestIdx;
  var r=cVis[cIdx];
  if(!r||!r.coordinates)return;

  // Highlight pin
  highlightPin(r.id);

  // Pan map smoothly without rebuild
  cScrollLock=true;
  // Use panTo (no zoom change) to keep current zoom level, no rebuild
  map.panTo([r.coordinates.lat,r.coordinates.lng],{animate:true,duration:0.4});
  setTimeout(function(){cScrollLock=false},700);
}

function showPreview(r){
  // En mode liste, ne pas afficher de carousel — ouvre directement la fiche
  if(listViewMode){ openResto(r.id); return; }
  // Lock carousel rebuild during the whole sequence
  cScrollLock=true;

  // 1. Zoom/pan to the pin first
  var needZoom=map.getZoom()<13;
  if(needZoom){
    map.setView([r.coordinates.lat,r.coordinates.lng],15,{animate:true});
  }else{
    map.panTo([r.coordinates.lat,r.coordinates.lng],{animate:true});
  }

  // 2. After map settles, build carousel and scroll to card
  var delay=needZoom?600:300;
  setTimeout(function(){
    cScrollLock=false;
    updateCarousel();
    highlightPin(r.id);

    // Scroll to the right card
    var sc=document.getElementById('cscrollEl');
    if(!sc)return;
    var cards=sc.querySelectorAll('.ccard');
    for(var i=0;i<cards.length;i++){
      if(cards[i].getAttribute('data-rid')===r.id){
        cIdx=i;
        // Use scrollLeft instead of scrollIntoView (more reliable on mobile)
        var cardLeft=cards[i].offsetLeft-sc.offsetLeft-(sc.offsetWidth-cards[i].offsetWidth)/2;
        sc.scrollTo({left:Math.max(0,cardLeft),behavior:'smooth'});
        break;
      }
    }
  },delay);
}
