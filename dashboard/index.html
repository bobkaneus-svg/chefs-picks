<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chefs' Picks — Recommandations de Grands Chefs</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --surface-3: #2e2e2e;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #e8a838;
      --accent-dim: #c4882a;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .logo .subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 85px);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .filters {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }

    .filter-row {
      display: flex;
      gap: 8px;
    }

    .filter-row select {
      flex: 1;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .filter-row select:focus { border-color: var(--accent); }

    .sort-btn {
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .sort-btn:hover { border-color: var(--accent); }
    .sort-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── Restaurant list ── */
    .restaurant-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .restaurant-list::-webkit-scrollbar { width: 6px; }
    .restaurant-list::-webkit-scrollbar-track { background: transparent; }
    .restaurant-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .restaurant-card {
      padding: 14px 16px;
      margin-bottom: 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .restaurant-card:hover { background: var(--surface-2); }
    .restaurant-card.active { background: var(--surface-2); border-color: var(--accent); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
    }

    .card-score {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .score-high { background: rgba(74,222,128,0.15); color: var(--green); }
    .score-mid { background: rgba(232,168,56,0.15); color: var(--accent); }
    .score-low { background: rgba(248,113,113,0.15); color: var(--red); }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--surface-3);
      border-radius: 20px;
      color: var(--text-muted);
    }

    .chef-count {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Main content ── */
    .main-content {
      display: flex;
      flex-direction: column;
    }

    #map {
      flex: 1;
      min-height: 50%;
    }

    /* ── Detail panel ── */
    .detail-panel {
      border-top: 1px solid var(--border);
      padding: 24px 32px;
      overflow-y: auto;
      max-height: 50%;
      display: none;
    }

    .detail-panel.visible { display: block; }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .detail-name {
      font-size: 22px;
      font-weight: 700;
    }

    .detail-address {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .detail-badges {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--surface-3);
      color: var(--text-muted);
    }

    .badge-cuisine { background: rgba(96,165,250,0.15); color: var(--blue); }
    .badge-price { background: rgba(232,168,56,0.15); color: var(--accent); }
    .badge-vibe { background: rgba(74,222,128,0.15); color: var(--green); }

    .close-detail {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    .close-detail:hover { color: var(--text); }

    .recommendations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .rec-card {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .rec-chef {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .rec-chef-restaurant {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .rec-quote {
      font-style: italic;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .rec-source {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .platform-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .platform-presse { background: rgba(96,165,250,0.15); color: var(--blue); }
    .platform-social { background: rgba(232,168,56,0.15); color: var(--accent); }
    .platform-podcast { background: rgba(168,85,247,0.15); color: #a855f7; }

    .no-selection {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 300px 1fr;
      }
      .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); }
      .main-content { order: 1; }
    }

    /* ── Leaflet overrides ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }

    .leaflet-popup-tip { background: var(--surface) !important; }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-size: 13px !important;
      line-height: 1.5 !important;
    }

    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .popup-meta { color: var(--text-muted); font-size: 12px; }
    .popup-chefs { color: var(--accent); font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1><span>Chefs'</span> Picks</h1>
    <span class="subtitle">Les adresses secrètes des grands chefs</span>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="filters">
      <input type="text" class="search-box" id="search" placeholder="Rechercher un restaurant, chef, ville...">
      <div class="filter-row">
        <select id="filter-city"><option value="">Toutes les villes</option></select>
        <select id="filter-cuisine"><option value="">Toutes les cuisines</option></select>
        <select id="filter-price"><option value="">Tous les prix</option></select>
      </div>
      <div class="filter-row">
        <button class="sort-btn active" data-sort="score">Score</button>
        <button class="sort-btn" data-sort="chefs">Nb chefs</button>
        <button class="sort-btn" data-sort="name">A-Z</button>
        <button class="sort-btn" data-sort="recent">Récent</button>
      </div>
    </div>
    <div class="restaurant-list" id="restaurant-list"></div>
  </aside>

  <div class="main-content">
    <div id="map"></div>
    <div class="detail-panel" id="detail-panel"></div>
  </div>
</div>

[{"chef_name": "Eric Frechon (proprietaire)", "chef_restaurant": "Epicure (3 etoiles Michelin, Bristol)", "quote": "", "source": "French Style - Grand Chef Petit Prix", "source_url": "https://jeanninebergeron.com/2021/12/grand-chef-petit-prix-brasseries-and-bistros-of-paris/", "date": "2021", "platform": "presse"}], "recommendation_count": 1, "confidence_score": 40, "last_updated": "2025-01-15"}];

  // ── Stats ──
  const chefs = new Set();
  const cities = new Set();
  const countries = new Set();
  restaurants.forEach(r => {
    cities.add(r.city);
    countries.add(r.country);
    r.recommendations.forEach(rec => chefs.add(rec.chef_name));
  });

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${restaurants.length}</div><div class="stat-label">Restaurants</div></div>
    <div class="stat"><div class="stat-value">${chefs.size}</div><div class="stat-label">Chefs</div></div>
    <div class="stat"><div class="stat-value">${cities.size}</div><div class="stat-label">Villes</div></div>
    <div class="stat"><div class="stat-value">${countries.size}</div><div class="stat-label">Pays</div></div>
  `;

  // ── Filters setup ──
  const citySelect = document.getElementById('filter-city');
  const cuisineSelect = document.getElementById('filter-cuisine');
  const priceSelect = document.getElementById('filter-price');

  [...cities].sort().forEach(c => {
    citySelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  const cuisines = [...new Set(restaurants.map(r => r.cuisine_type))].sort();
  cuisines.forEach(c => {
    cuisineSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  ['€','€€','€€€','€€€€'].forEach(p => {
    priceSelect.innerHTML += `<option value="${p}">${p}</option>`;
  });

  // ── Map ──
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([48.8566, 2.3522], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  const accentIcon = L.divIcon({
    className: '',
    html: `<svg width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#e8a838"/><circle cx="14" cy="14" r="6" fill="#0f0f0f"/></svg>`,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36]
  });

  const defaultIcon = L.divIcon({
    className: '',
    html: `<svg width="22" height="28" viewBox="0 0 22 28"><path d="M11 0C4.93 0 0 4.93 0 11c0 8.25 11 17 11 17s11-8.75 11-17C22 4.93 17.07 0 11 0z" fill="#666"/><circle cx="11" cy="11" r="4.5" fill="#0f0f0f"/></svg>`,
    iconSize: [22, 28],
    iconAnchor: [11, 28],
    popupAnchor: [0, -28]
  });

  let markers = {};

  function createMarkers(data) {
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};

    data.forEach(r => {
      if (!r.coordinates) return;
      const chefsStr = r.recommendations.map(rec => rec.chef_name).join(', ');
      const marker = L.marker([r.coordinates.lat, r.coordinates.lng], { icon: defaultIcon })
        .bindPopup(`
          <div class="popup-name">${r.name}</div>
          <div class="popup-meta">${r.cuisine_type} · ${r.price_range} · ${r.city}</div>
          <div class="popup-chefs">${r.recommendation_count} chef${r.recommendation_count > 1 ? 's' : ''} : ${chefsStr}</div>
        `)
        .addTo(map);

      marker.on('click', () => selectRestaurant(r.id));
      markers[r.id] = marker;
    });

    if (data.length > 0) {
      const bounds = L.latLngBounds(data.filter(r => r.coordinates).map(r => [r.coordinates.lat, r.coordinates.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }

  // ── Render list ──
  let currentSort = 'score';
  let selectedId = null;

  function getScoreClass(score) {
    if (score >= 70) return 'score-high';
    if (score >= 50) return 'score-mid';
    return 'score-low';
  }

  function renderList(data) {
    const list = document.getElementById('restaurant-list');
    if (data.length === 0) {
      list.innerHTML = '<div class="no-selection">Aucun restaurant trouvé</div>';
      return;
    }

    list.innerHTML = data.map(r => `
      <div class="restaurant-card ${r.id === selectedId ? 'active' : ''}" data-id="${r.id}">
        <div class="card-header">
          <div class="card-name">${r.name}</div>
          <div class="card-score ${getScoreClass(r.confidence_score)}">${r.confidence_score}</div>
        </div>
        <div class="card-meta">
          <span>${r.city}, ${r.country}</span>
          <span>${r.cuisine_type}</span>
          <span>${r.price_range}</span>
        </div>
        <div class="card-tags">
          <span class="chef-count">${r.recommendation_count} chef${r.recommendation_count > 1 ? 's' : ''}</span>
          ${r.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.restaurant-card').forEach(card => {
      card.addEventListener('click', () => selectRestaurant(card.dataset.id));
    });
  }

  // ── Detail panel ──
  function selectRestaurant(id) {
    selectedId = id;
    const r = restaurants.find(r => r.id === id);
    if (!r) return;

    // Update markers
    Object.entries(markers).forEach(([mId, marker]) => {
      marker.setIcon(mId === id ? accentIcon : defaultIcon);
    });

    if (r.coordinates) {
      map.setView([r.coordinates.lat, r.coordinates.lng], 14, { animate: true });
    }

    const panel = document.getElementById('detail-panel');
    panel.className = 'detail-panel visible';
    panel.innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-name">${r.name}</div>
          <div class="detail-address">${r.address}</div>
          <div class="detail-badges">
            <span class="badge badge-cuisine">${r.cuisine_type}</span>
            <span class="badge badge-price">${r.price_range}</span>
            <span class="badge badge-vibe">${r.vibe}</span>
            ${r.tags.map(t => `<span class="badge">${t}</span>`).join('')}
          </div>
        </div>
        <button class="close-detail" onclick="closeDetail()">&times;</button>
      </div>
      <div class="recommendations-grid">
        ${r.recommendations.map(rec => `
          <div class="rec-card">
            <div class="rec-chef">${rec.chef_name}</div>
            <div class="rec-chef-restaurant">${rec.chef_restaurant || ''}</div>
            ${rec.quote ? `<div class="rec-quote">"${rec.quote}"</div>` : ''}
            <div class="rec-source">
              <span>${rec.source} · ${rec.date || '?'}</span>
              <span class="platform-tag platform-${rec.platform}">${rec.platform}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    // Update active card in list
    document.querySelectorAll('.restaurant-card').forEach(c => {
      c.classList.toggle('active', c.dataset.id === id);
    });
  }

  window.closeDetail = function() {
    selectedId = null;
    document.getElementById('detail-panel').className = 'detail-panel';
    Object.values(markers).forEach(m => m.setIcon(defaultIcon));
    document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('active'));
  };

  // ── Filter & sort ──
  function getFiltered() {
    const query = document.getElementById('search').value.toLowerCase();
    const city = citySelect.value;
    const cuisine = cuisineSelect.value;
    const price = priceSelect.value;

    let data = restaurants.filter(r => {
      if (city && r.city !== city) return false;
      if (cuisine && r.cuisine_type !== cuisine) return false;
      if (price && r.price_range !== price) return false;
      if (query) {
        const haystack = [r.name, r.city, r.country, r.cuisine_type, ...r.tags,
          ...r.recommendations.map(rec => rec.chef_name)].join(' ').toLowerCase();
        if (!haystack.includes(query)) return false;
      }
      return true;
    });

    switch (currentSort) {
      case 'score': data.sort((a, b) => b.confidence_score - a.confidence_score); break;
      case 'chefs': data.sort((a, b) => b.recommendation_count - a.recommendation_count); break;
      case 'name': data.sort((a, b) => a.name.localeCompare(b.name)); break;
      case 'recent': data.sort((a, b) => b.last_updated.localeCompare(a.last_updated)); break;
    }

    return data;
  }

  function update() {
    const data = getFiltered();
    renderList(data);
    createMarkers(data);
  }

  // ── Event listeners ──
  document.getElementById('search').addEventListener('input', update);
  citySelect.addEventListener('change', update);
  cuisineSelect.addEventListener('change', update);
  priceSelect.addEventListener('change', update);

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      update();
    });
  });

  // ── Init ──
  update();
})();
</script>
