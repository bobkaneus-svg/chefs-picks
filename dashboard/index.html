<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Chefs' Picks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
tailwind.config={darkMode:"class",theme:{extend:{
  colors:{"primary-fixed-dim":"#fdba49","surface-container-high":"#2a2a2a","surface-bright":"#3a3939","outline-variant":"#504535","outline":"#9d8e7c","surface-container-highest":"#353534","on-surface-variant":"#d5c4af","on-surface":"#e5e2e1","background":"#131313","surface":"#131313","surface-container":"#201f1f","on-primary":"#432c00","surface-container-lowest":"#0e0e0e","primary-fixed":"#ffddaf","tertiary":"#cec9ff","secondary":"#cdc5bc","surface-container-low":"#1c1b1b","primary-container":"#e8a838","secondary-container":"#4b463f","surface-variant":"#353534","on-secondary-container":"#bbb4ab","on-background":"#e5e2e1","primary":"#ffc66b","on-primary-fixed":"#281800","on-primary-container":"#5f3f00","on-primary-fixed-variant":"#614000","tertiary-container":"#b0aaff"},
  fontFamily:{headline:["Plus Jakarta Sans"],body:["Manrope"],label:["Manrope"]}
}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}
.serif-quote{font-family:'Times New Roman',serif;font-style:italic}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
body{min-height:100dvh;overflow:hidden;background:#131313}
a{text-decoration:none}
.screen{display:none;position:fixed;inset:0;z-index:10;background:#131313;overflow-y:auto}
.screen.active{display:block}
.screen-enter{animation:slideIn .3s ease-out}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.leaflet-container{background:#0e0e0e!important}
.leaflet-tile{filter:brightness(.35) saturate(0) contrast(1.4)}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.map-gradient-overlay{position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at center,transparent 0%,rgba(19,19,19,.4) 100%)}
.pin-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pin-wrap:hover .pin-circle{transform:scale(1.15)}
.pin-circle{transition:transform .2s;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-family:'Manrope'}
.pin-stem{margin-top:-1px}
.pin-hot .pin-circle{background:#e8a838;color:#281800;border:4px solid #131313;box-shadow:0 0 20px rgba(232,168,56,.4)}
.pin-hot .pin-stem{width:4px;height:12px;background:#e8a838}
.pin-warm .pin-circle{background:#353534;color:#ffc66b;border:2px solid rgba(232,168,56,.4);box-shadow:0 4px 15px rgba(0,0,0,.4)}
.pin-warm .pin-stem{width:2px;height:8px;background:rgba(232,168,56,.4)}
.pin-cool .pin-circle{background:#2a2a2a;color:#9d8e7c;border:2px solid #353534}
.pin-cool .pin-stem{width:2px;height:6px;background:#353534}
.badge-presse{background:rgba(206,201,255,.12);color:#cec9ff;border:1px solid rgba(206,201,255,.15)}
.badge-social{background:rgba(232,168,56,.12);color:#e8a838;border:1px solid rgba(232,168,56,.15)}
.badge-podcast{background:rgba(176,170,255,.12);color:#b0aaff;border:1px solid rgba(176,170,255,.15)}
</style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

<!-- EXPLORE -->
<div class="screen active" id="screen-explore">
  <header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-md flex justify-between items-center px-6 h-16">
    <span class="material-symbols-outlined text-[#e8a838] cursor-pointer active:scale-95 transition-transform" onclick="toggleDrawer()">menu</span>
    <h1 class="text-xl tracking-widest font-light text-[#e8a838] font-headline uppercase">CHEFS' PICKS</h1>
    <div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-sm">person</span>
    </div>
  </header>
  <div class="fixed top-20 left-0 right-0 z-30 px-6 space-y-4">
    <div class="w-full bg-surface-container-high/80 backdrop-blur-xl rounded-2xl p-1 flex items-center shadow-2xl border border-outline-variant/10">
      <div class="pl-4 pr-2"><span class="material-symbols-outlined text-outline">search</span></div>
      <input id="map-search" class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline w-full py-3 font-label text-sm" placeholder="Find a hidden gem..." type="text"/>
      <div class="pr-2"><button class="p-2 bg-surface-variant rounded-xl text-primary"><span class="material-symbols-outlined">tune</span></button></div>
    </div>
    <div id="map-filters" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
  </div>
  <div class="relative w-full h-full">
    <div id="map" class="w-full h-full"></div>
    <div class="map-gradient-overlay"></div>
  </div>
  <div id="map-preview" class="fixed bottom-24 left-0 right-0 px-6 z-30" style="display:none"></div>
  <div class="fixed bottom-28 right-6 z-40">
    <button class="w-14 h-14 bg-gradient-to-br from-[#e8a838] to-[#ffc66b] rounded-full shadow-2xl flex items-center justify-center text-[#281800] active:scale-90 transition-transform">
      <span class="material-symbols-outlined" style="font-weight:700">add</span>
    </button>
  </div>
</div>

<!-- DISCOVER -->
<div class="screen" id="screen-discover">
  <header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-md flex justify-between items-center px-6 h-16">
    <span class="material-symbols-outlined text-[#e8a838] cursor-pointer" onclick="toggleDrawer()">menu</span>
    <h1 class="text-xl tracking-widest font-light text-[#e8a838] font-headline uppercase">CHEFS' PICKS</h1>
    <div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">person</span></div>
  </header>
  <main class="pt-20 pb-28 px-6">
    <div class="mb-8 space-y-4">
      <div class="relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none"><span class="material-symbols-outlined text-outline">search</span></div>
        <input id="list-search" class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary/50 placeholder:text-outline/50 text-sm" placeholder="Search curated tables..." type="text"/>
      </div>
      <div class="flex gap-3 overflow-x-auto no-scrollbar items-center" id="list-filters"></div>
      <div class="flex gap-2 items-center">
        <button onclick="setSort('score')" class="sort-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex items-center gap-1" data-sort="score">Score</button>
        <button onclick="setSort('chefs')" class="sort-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex items-center gap-1" data-sort="chefs">Chefs</button>
        <button onclick="setSort('name')" class="sort-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex items-center gap-1" data-sort="name">A-Z</button>
        <span class="ml-auto text-xs text-outline font-label" id="list-count"></span>
      </div>
    </div>
    <div class="space-y-10" id="list-cards"></div>
  </main>
</div>

<!-- CHEFS -->
<div class="screen" id="screen-chefs">
  <header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-md flex justify-between items-center px-6 h-16">
    <span class="material-symbols-outlined text-[#e8a838] cursor-pointer" onclick="toggleDrawer()">menu</span>
    <h1 class="text-xl tracking-widest font-light text-[#e8a838] font-headline uppercase">CHEFS</h1>
    <span class="text-xs text-outline font-label" id="chefs-count"></span>
  </header>
  <main class="pt-20 pb-28 px-6">
    <input id="chef-search" class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-4 pr-4 text-on-surface focus:ring-1 focus:ring-primary/50 placeholder:text-outline/50 text-sm mb-6" placeholder="Search a chef..." type="text"/>
    <div class="space-y-3" id="chefs-list"></div>
  </main>
</div>

<!-- DETAIL -->
<div class="screen" id="screen-detail"><div id="detail-content"></div></div>

<!-- DRAWER -->
<div id="drawer-overlay" class="fixed inset-0 z-[90] bg-black/50 backdrop-blur-sm hidden" onclick="toggleDrawer()"></div>
<aside id="drawer" class="fixed inset-y-0 left-0 z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out">
  <div class="h-full w-80 rounded-r-3xl bg-[#1c1b1b] shadow-2xl flex flex-col p-8 space-y-4">
    <div class="flex items-center gap-4 pb-8 mb-4 border-b border-outline-variant/10">
      <div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center"><span class="material-symbols-outlined text-[#e8a838] text-2xl">restaurant</span></div>
      <div><h3 class="text-[#e8a838] font-bold font-headline">Chefs' Picks</h3><p class="text-[10px] text-outline uppercase tracking-widest" id="drawer-stats"></p></div>
    </div>
    <nav class="space-y-2">
      <a onclick="showScreen('explore');toggleDrawer()" class="flex items-center gap-4 p-4 text-[#e5e2e1] hover:bg-[#353534] transition-colors rounded-xl font-headline font-light cursor-pointer"><span class="material-symbols-outlined text-[#e8a838]">map</span>Explorer la carte</a>
      <a onclick="showScreen('discover');toggleDrawer()" class="flex items-center gap-4 p-4 text-[#e5e2e1] hover:bg-[#353534] transition-colors rounded-xl font-headline font-light cursor-pointer"><span class="material-symbols-outlined text-[#e8a838]">flatware</span>Découvrir</a>
      <a onclick="showScreen('chefs');toggleDrawer()" class="flex items-center gap-4 p-4 text-[#e5e2e1] hover:bg-[#353534] transition-colors rounded-xl font-headline font-light cursor-pointer"><span class="material-symbols-outlined text-[#e8a838]">person_pin</span>Les Chefs</a>
    </nav>
  </div>
</aside>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl rounded-t-2xl flex justify-around items-center pt-3 pb-8 px-4 shadow-[0_-20px_40px_rgba(0,0,0,.15)]">
  <a onclick="showScreen('explore')" class="nav-tab flex flex-col items-center cursor-pointer" data-tab="explore"><span class="material-symbols-outlined">map</span><span class="text-[10px] font-label tracking-[.5pt] uppercase mt-1">Explore</span></a>
  <a onclick="showScreen('discover')" class="nav-tab flex flex-col items-center cursor-pointer" data-tab="discover"><span class="material-symbols-outlined">restaurant</span><span class="text-[10px] font-label tracking-[.5pt] uppercase mt-1">Discover</span></a>
  <a class="nav-tab flex flex-col items-center cursor-pointer text-[#9d8e7c]" data-tab="curated"><span class="material-symbols-outlined">star</span><span class="text-[10px] font-label tracking-[.5pt] uppercase mt-1">Curated</span></a>
  <a onclick="showScreen('chefs')" class="nav-tab flex flex-col items-center cursor-pointer" data-tab="chefs"><span class="material-symbols-outlined">person_pin</span><span class="text-[10px] font-label tracking-[.5pt] uppercase mt-1">Chefs</span></a>
  <a class="nav-tab flex flex-col items-center cursor-pointer text-[#9d8e7c]" data-tab="saved"><span class="material-symbols-outlined">bookmark</span><span class="text-[10px] font-label tracking-[.5pt] uppercase mt-1">Saved</span></a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=2"></script>
</body>
</html>
